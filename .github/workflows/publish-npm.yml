name: Publish to npm

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-npm-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure npm token is configured
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set" >&2
            exit 1
          fi

      - name: Verify tag matches package version
        run: |
          package_version="$(npm pkg get version | tr -d '"')"
          tag_name="${GITHUB_REF_NAME}"
          tag_version="${tag_name#v}"

          if [ "$tag_name" != "$package_version" ] && [ "$tag_version" != "$package_version" ]; then
            echo "Tag ${tag_name} does not match package.json version ${package_version}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
